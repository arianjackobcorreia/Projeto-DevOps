name: CI - Java Cartas System

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositório
      uses: actions/checkout@v3

    - name: Configurar Java
      uses: actions/setup-java@v3
      with:
        distribuition: 'temurin'
        java-version: '17'

    - name: Compilar projeto
      run: javac $(find . -name "*.java")

    - name: Rodar aplicação
      run: java Main || echo "Execução finalizada"